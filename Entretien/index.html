<!-- Dans la toolbar, ajouter le bouton Historique -->
<div class="toolbar-actions">
  <button class="btn-history" id="btnHistoryMaintenance"><i class="fas fa-history"></i> Historique</button>
  <button class="btn-print" onclick="window.print()"><i class="fas fa-print"></i> Imprimer</button>
  <button class="btn-pdf" id="btnPdfMaintenance"><i class="fas fa-file-pdf"></i> PDF</button>
  <button class="btn-new-report" id="btnNewReport"><i class="fas fa-file"></i> Nouveau rapport</button>
</div>

<!-- Ajouter le panneau d'historique (avant le footer) -->
<div class="history-overlay" id="historyMaintenanceOverlay">
  <div class="history-panel">
    <div class="history-panel-header">
      <span><i class="fas fa-history"></i> Historique des rapports</span>
      <button type="button" id="btnCloseHistoryMaintenance" aria-label="Fermer"><i class="fas fa-times"></i></button>
    </div>
    <div class="history-tools">
      <input type="search" id="historyMaintenanceSearch" placeholder="Rechercher...">
    </div>
    <div class="history-list" id="historyMaintenanceList"></div>
  </div>
</div>
